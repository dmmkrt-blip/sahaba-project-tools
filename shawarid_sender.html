<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إضافة شاردة — موسوعة آثار الصحابة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0e0c; color: #e8e0d0;
    font-family: 'Cairo', sans-serif;
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 20px;
  }
  h1 { font-size: 20px; color: #c9a84c; margin-bottom: 8px; text-align: center; }
  .sub { font-size: 12px; color: #8a7f6e; text-align: center; margin-bottom: 28px; }

  .card {
    width: 100%; max-width: 580px;
    background: #141210; border: 1px solid #2e2a22;
    border-radius: 8px; padding: 28px;
  }

  .hint {
    font-size: 12px; color: #8a7f6e; margin-bottom: 16px;
    background: #1a1814; border: 1px solid #2e2a22;
    border-radius: 6px; padding: 14px 16px; line-height: 1.8;
  }
  .hint-title {
    color: #c9a84c; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; margin-bottom: 6px;
  }
  .hint pre {
    direction: ltr; text-align: left;
    font-family: 'Courier New', monospace;
    font-size: 11px; color: #a89878;
    background: #0f0e0c; border-radius: 5px;
    padding: 10px 12px; margin-top: 6px;
    white-space: pre-wrap; word-break: break-all;
    border: 1px solid #2e2a22;
  }
  .hint-sep { border: none; border-top: 1px solid #2e2a22; margin: 12px 0; }

  textarea {
    width: 100%; height: 180px;
    background: #0f0e0c; border: 1px solid #2e2a22;
    border-radius: 8px; padding: 14px;
    color: #e8e0d0; font-family: 'Courier New', monospace;
    font-size: 13px; direction: ltr; text-align: left;
    resize: vertical; outline: none; margin-bottom: 14px;
  }
  textarea:focus { border-color: #7a6230; }

  button.btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #7a6230, #c9a84c);
    border: none; border-radius: 8px; color: #0f0e0c;
    font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  button.btn:hover { opacity: 0.85; }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #status { margin-top: 12px; font-size: 14px; font-weight: 600; text-align: center; min-height: 20px; }
  .ok  { color: #4caf7d; }
  .err { color: #c94c4c; }
  .wait{ color: #c9a84c; }
</style>
</head>
<body>

<h1>إضافة شاردة</h1>
<p class="sub">موسوعة آثار الصحابة</p>

<div class="card">
  <div class="hint">
    <div class="hint-title">ترقيم برقم الأثر</div>
    <pre>{"الأثر / الحديث":"...","المصدر":"...","رقم الأثر":0,"الفائدة":"...","ملاحظات":"..."}</pre>
    <hr class="hint-sep">
    <div class="hint-title">ترقيم بجزء وصفحة</div>
    <pre>{"الأثر / الحديث":"...","المصدر":"...","الجزء":0,"الصفحة":0,"الفائدة":"...","ملاحظات":"..."}</pre>
  </div>
  <textarea id="json" placeholder="الصق هنا JSON الشاردة..."></textarea>
  <button class="btn" id="btn" onclick="send()">إضافة إلى Airtable</button>
  <div id="status"></div>
</div>

<script>
const TOKEN = 'patIxht7gMvz6WuH6.62dccb1ca5b853ca3e9605427c6b3890360676f47768ef04a94fede56d285ebb';
const BASE  = 'appD7L8R2q9z3H7K3';
const TABLE = 'الشوارد';

async function send() {
  const raw = document.getElementById('json').value.trim();
  const btn = document.getElementById('btn');
  const st  = document.getElementById('status');
  if (!raw) { st.className='err'; st.textContent='الحقل فارغ'; return; }
  let payload;
  try { payload = JSON.parse(raw); } catch(e) { st.className='err'; st.textContent='JSON غير صحيح: '+e.message; return; }
  btn.disabled = true; st.className='wait'; st.textContent='جارٍ الإضافة...';
  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE}/${encodeURIComponent(TABLE)}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ records: [{ fields: payload }] })
    });
    const data = await res.json();
    if (data.records || data.id) {
      st.className='ok'; st.textContent='✓ تمت الإضافة بنجاح';
      document.getElementById('json').value = '';
    } else {
      st.className='err'; st.textContent='خطأ: ' + JSON.stringify(data.error);
    }
  } catch(e) { st.className='err'; st.textContent='فشل الاتصال: '+e.message; }
  btn.disabled = false;
}
</script>
</body>
</html>
